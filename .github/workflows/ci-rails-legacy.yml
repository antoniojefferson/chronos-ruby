name: Legacy Rails CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  example:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ruby:2.2.10
            example: examples/rails-4.2
          - image: ruby:2.5.9
            example: examples/rails-5.2
    name: ${{ matrix.image }} / ${{ matrix.example }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run Rails compatibility application
        run: |
          docker run --rm \
            --volume "$PWD:/app" \
            --workdir /app \
            --env EXAMPLE_PATH="${{ matrix.example }}" \
            "${{ matrix.image }}" \
            sh script/ci_rails_legacy
