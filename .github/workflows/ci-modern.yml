name: Repository checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  documentation-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: ruby script/verify_docs
      - run: gem build chronos-ruby.gemspec
