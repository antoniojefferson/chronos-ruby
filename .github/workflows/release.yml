name: Release

on:
  push:
    tags:
      - "v0.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: rubygems
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "2.6"
      - name: Update RubyGems
        run: gem update --system 3.4.22 --no-document
      - name: Verify tag and gem version
        run: |
          ruby -Ilib -rchronos/version -e '
            expected = "v#{Chronos::VERSION}"
            abort "Tag must be #{expected}" unless ENV["GITHUB_REF_NAME"] == expected
          '
      - run: gem install bundler -v 1.17.3
      - run: bundle _1.17.3_ install
      - run: bundle _1.17.3_ exec rake
      - run: gem build chronos-ruby.gemspec
      - name: Publish gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push chronos-ruby-*.gem
